services:
  market-db:
    image: postgres:15
    container_name: market-db
    environment:
      POSTGRES_DB: market_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: P@ssw0rd
    ports:
      - "5432:5432"
    volumes:
      - market-db-data:/var/lib/postgresql/data
    networks:
      - app-network

  marketplace:
    build:
      context: ./marketplace
      dockerfile: Dockerfile
    container_name: marketplace
    depends_on:
      - market-db
      - kafka
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MARKET_DB_URL: jdbc:postgresql://market-db:5432/market_db
      MARKET_DB_USERNAME: postgres
      MARKET_DB_PASSWORD: P@ssw0rd
      JWT_SECRET: "aB3dE5fG7hJ9kL1nP2rT4vW6xY8zA0cC2eE4gG6iI8kK0mM"
      JWT_EXPIRATION: 86400000
      ADMIN_USERNAME: "ADMIN"
      ADMIN_PASSWORD: "ADMIN"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8080:8080"
    networks:
      - app-network

  notification-db:
    image: postgres:15
    container_name: notification-db
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: P@ssw0rd
    ports:
      - "5433:5432"
    volumes:
      - notification-db-data:/var/lib/postgresql/data
    networks:
      - app-network

  notification:
    build:
      context: ./notification
      dockerfile: Dockerfile
    container_name: notification
    depends_on:
      - notification-db
      - kafka
    environment:
      SPRING_PROFILES_ACTIVE: docker
      NOTIFICATION_DB_URL: jdbc:postgresql://notification-db:5432/notification_db
      NOTIFICATION_DB_USERNAME: postgres
      NOTIFICATION_DB_PASSWORD: P@ssw0rd
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    networks:
      - app-network


  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: CONTROLLER://0.0.0.0:29093,BROKER://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: BROKER://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,BROKER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: BROKER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: [ "CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:29092" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  kafka-topic-init:
    image: apache/kafka:4.2.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      /opt/kafka/bin/kafka-topics.sh --create --topic purchases --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1 --if-not-exists
    networks:
      - app-network

volumes:
  market-db-data:
  notification-db-data:

networks:
  app-network:
    driver: bridge